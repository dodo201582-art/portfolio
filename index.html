<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>김도훈 Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0c0c0c;
      --nav-bg: rgba(12,12,12,0.94);
      --border: rgba(255,255,255,0.08);
      --text:   rgba(255,255,255,0.85);
      --dur:    300ms; /* 지연 없는 깔끔한 속도 */
      --nav-h:  52px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

    /* ─── NAV ─── */
    nav {
      height: var(--nav-h); display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; position: relative; z-index: 20; background: var(--nav-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.9); }
    .page-tabs { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 2px; }
    .tab-btn {
      background: none; border: none; color: rgba(255,255,255,0.22); font-size: 11px;
      width: 26px; height: 26px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .tab-btn.active { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9); font-weight: 600; }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .counter-badge { font-size: 11px; color: rgba(255,255,255,0.3); }
    .nav-progress { position: absolute; bottom: 0; left: 0; height: 1px; background: rgba(255,255,255,0.6); transition: width 0.2s ease; }

    /* ─── STAGE ─── */
    #stage { flex: 1; height: calc(100vh - var(--nav-h)); position: relative; overflow: hidden; }
    
    .slide {
      position: absolute; inset: 0; opacity: 0; pointer-events: none;
      transition: transform var(--dur) cubic-bezier(0.25, 1, 0.5, 1), opacity var(--dur) ease;
      will-change: transform, opacity;
    }
    .slide.current { opacity: 1; transform: translateY(0); pointer-events: all; z-index: 2; }
    .slide.offTop { transform: translateY(-100%); opacity: 0; }
    .slide.offBottom { transform: translateY(100%); opacity: 0; }

    iframe { width: 1280px; height: 720px; border: none; transform-origin: top left; display: block; }

    /* ─── UI ELEMENTS ─── */
    .arrow-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: white; width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
    }
    .bottom-bar { display: none; padding: 10px; background: var(--nav-bg); border-top: 1px solid var(--border); }

    @media (max-width: 600px) {
      .page-tabs, .nav-right { display: none; }
      .bottom-bar { display: flex; align-items: center; gap: 10px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">Cloud TA <strong>김도훈</strong></div>
  <div class="page-tabs" id="pageTabs"></div>
  <div class="nav-right">
    <span class="counter-badge"><em id="curNum">1</em> / 33</span>
    <button class="arrow-btn" onclick="goPrev()">↑</button>
    <button class="arrow-btn" onclick="goNext()">↓</button>
  </div>
  <div id="navProgress" class="nav-progress"></div>
</nav>

<main id="stage"></main>

<div class="bottom-bar">
  <button class="arrow-btn" onclick="goPrev()">↑</button>
  <input type="range" id="pageSlider" min="0" max="32" value="0" style="flex:1; accent-color:white;">
  <button class="arrow-btn" onclick="goNext()">↓</button>
</div>

<script>
  const TOTAL = 33;
  let current = 0;
  let animating = false;
  const SLIDE_W = 1280, SLIDE_H = 720;

  const stage = document.getElementById('stage');
  const slideEls = [];

  // 초기 슬라이드 구조 생성
  for (let i = 0; i < TOTAL; i++) {
    const div = document.createElement('div');
    div.className = `slide ${i === 0 ? 'current' : 'offBottom'}`;
    stage.appendChild(div);
    slideEls.push({ el: div, loaded: false, src: `slide${String(i + 1).padStart(2, '0')}.html` });
  }

  function scaleIframe(iframe) {
    const sw = stage.clientWidth, sh = stage.clientHeight;
    const scale = Math.min(sw / SLIDE_W, sh / SLIDE_H);
    iframe.style.transform = `translate(${(sw - SLIDE_W * scale) / 2}px, ${(sh - SLIDE_H * scale) / 2}px) scale(${scale})`;
  }

  function loadSlide(i) {
    if (i < 0 || i >= TOTAL || slideEls[i].loaded) return;
    const s = slideEls[i];
    s.loaded = true;
    const ifr = document.createElement('iframe');
    ifr.src = s.src;
    ifr.onload = () => {
      scaleIframe(ifr);
      // [핵심] iframe 내부 키보드 이벤트 가로채기
      try {
        ifr.contentWindow.addEventListener('keydown', handleKey);
        ifr.contentWindow.addEventListener('wheel', handleWheel, { passive: false });
      } catch(e) { console.warn("Cross-origin restriction or file not found."); }
    };
    s.el.appendChild(ifr);
  }

  function goTo(next) {
    if (next === current || next < 0 || next >= TOTAL || animating) return;
    animating = true;
    
    const from = slideEls[current].el;
    const to = slideEls[next].el;
    
    loadSlide(next);
    
    // 즉각적인 클래스 변경
    to.className = 'slide current';
    from.className = next > current ? 'slide offTop' : 'slide offBottom';
    
    current = next;
    updateUI();
    
    setTimeout(() => { animating = false; }, 300); // --dur와 일치
  }

  const goNext = () => goTo(current + 1);
  const goPrev = () => goTo(current - 1);

  function handleKey(e) {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') goPrev();
  }

  let lastWheel = 0;
  function handleWheel(e) {
    const now = Date.now();
    if (now - lastWheel < 500) return; 
    if (Math.abs(e.deltaY) < 20) return;
    lastWheel = now;
    e.deltaY > 0 ? goNext() : goPrev();
  }

  function updateUI() {
    document.getElementById('curNum').textContent = current + 1;
    document.getElementById('navProgress').style.width = `${(current / (TOTAL - 1)) * 100}%`;
    document.getElementById('pageSlider').value = current;
    
    // 탭 업데이트
    const tabs = document.getElementById('pageTabs');
    tabs.innerHTML = '';
    const start = Math.max(0, current - 2), end = Math.min(TOTAL - 1, start + 4);
    for (let i = start; i <= end; i++) {
      const b = document.createElement('button');
      b.className = `tab-btn ${i === current ? 'active' : ''}`;
      b.textContent = i + 1;
      b.onclick = () => goTo(i);
      tabs.appendChild(b);
    }
    // 인접 슬라이드 예비 로드
    loadSlide(current + 1);
    loadSlide(current - 1);
  }

  // 이벤트 바인딩
  window.addEventListener('keydown', handleKey);
  window.addEventListener('wheel', handleWheel, { passive: false });
  window.addEventListener('resize', () => document.querySelectorAll('iframe').forEach(scaleIframe));
  document.getElementById('pageSlider').oninput = (e) => goTo(parseInt(e.target.value));

  // 시작
  loadSlide(0);
  updateUI();
</script>
</body>
</html>
