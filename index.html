<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>김도훈 Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #0c0c0c;
      --nav-bg: rgba(12,12,12,0.94);
      --border: rgba(255,255,255,0.08);
      --muted:  rgba(255,255,255,0.28);
      --text:   rgba(255,255,255,0.85);
      --dur:    10ms;
      --nav-h:  52px;
      --bar-h:  60px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; height: -webkit-fill-available; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      padding-top:    env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left:   env(safe-area-inset-left);
      padding-right:  env(safe-area-inset-right);
    }

    /* ─── NAV ─── */
    nav {
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      position: relative;
      z-index: 20;
      background: var(--nav-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: rgba(255,255,255,0.9);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-logo .divider {
      width: 1px; height: 11px;
      background: rgba(255,255,255,0.18);
    }
    .nav-logo .sub {
      font-weight: 300;
      color: rgba(255,255,255,0.36);
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    /* 중앙 탭 */
    .page-tabs {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 1px;
    }
    .tab-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.22);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 400;
      width: 26px; height: 26px;
      border-radius: 5px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      flex-shrink: 0;
    }
    .tab-btn:hover:not(.active) {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
    }
    .tab-btn.active {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.9);
      font-weight: 500;
    }
    .tab-ellipsis {
      color: rgba(255,255,255,0.12);
      font-size: 10px;
      padding: 0 2px;
      pointer-events: none;
      letter-spacing: 0.05em;
    }

    /* 우측 */
    .nav-right {
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .counter-badge {
      font-size: 11px; font-weight: 300;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.04em;
      min-width: 36px; text-align: right;
    }
    .counter-badge em { color: rgba(255,255,255,0.7); font-style: normal; font-weight: 400; }

    .arrow-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s, transform 0.07s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .arrow-btn:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.85); }
    .arrow-btn:active { transform: scale(0.88); }

    .nav-progress {
      position: absolute; bottom: 0; left: 0;
      height: 1px;
      background: rgba(255,255,255,0.35);
      transition: width var(--dur) linear;
    }

    /* ─── STAGE ─── */
    .stage {
      flex: 1; position: relative;
      overflow: hidden; min-height: 0;
      outline: none;
    }

    /* overlay는 wheel/touch 전용 — 클릭은 iframe으로 통과 */
    .slide-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      cursor: default;
    }

    .slide {
      position: absolute; inset: 0;
      transition: transform var(--dur) linear, opacity var(--dur) linear;
      will-change: transform, opacity;
    }
    .slide iframe {
      width: 1280px;
      height: 720px;
      border: none;
      display: block;
      transform-origin: top left;
      /* JS로 scale 값 동적 적용 */
    }
    .slide.current              { transform: translateY(0);     opacity: 1; }
    .slide.offTop               { transform: translateY(-100%); opacity: 0; }
    .slide.offBottom            { transform: translateY(100%);  opacity: 0; }
    .slide.entering-from-bottom { transform: translateY(100%);  opacity: 0; }
    .slide.entering-from-top    { transform: translateY(-100%); opacity: 0; }

    /* ─── PLACEHOLDER ─── */
    .placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; background: var(--bg);
    }
    .ph-num {
      font-size: 72px; font-weight: 300;
      color: rgba(255,255,255,0.03);
      letter-spacing: -0.03em; line-height: 1;
    }
    .ph-bar {
      width: 28px; height: 1px;
      background: rgba(255,255,255,0.07);
      overflow: hidden; position: relative;
    }
    .ph-bar::after {
      content: '';
      position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer { to { left: 200%; } }

    /* ─── SCROLL HINT ─── */
    .scroll-hint {
      position: absolute;
      left: 24px;
      bottom: 36px;
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
      opacity: 0;
      animation: hintAppear 0.8s 1.2s ease forwards;
      transition: opacity 1s ease;
    }
    .scroll-hint.hidden { opacity: 0 !important; animation: none; }

    @keyframes hintAppear {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hint-label {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      writing-mode: vertical-rl;
      white-space: nowrap;
    }

    .hint-arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .hint-arrow span {
      display: block;
      width: 1px;
      background: rgba(255,255,255,0.4);
      border-radius: 1px;
    }
    .hint-arrow span:nth-child(1) { height: 16px; animation: fadeBar 1.6s 0s ease-in-out infinite; }
    .hint-arrow span:nth-child(2) { height: 10px; animation: fadeBar 1.6s 0.2s ease-in-out infinite; }
    .hint-arrow span:nth-child(3) { height: 6px;  animation: fadeBar 1.6s 0.4s ease-in-out infinite; }

    @keyframes fadeBar {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 0.7; }
    }

    /* ─── MOBILE BOTTOM ─── */
    .bottom-bar {
      display: none;
      height: var(--bar-h);
      flex-shrink: 0;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      background: var(--nav-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
    }
    .bottom-bar .arrow-btn { width: 42px; height: 42px; border-radius: 9px; font-size: 13px; }
    .bottom-center { flex: 1; display: flex; flex-direction: column; gap: 7px; }
    .bottom-meta { display: flex; justify-content: space-between; align-items: center; }
    .bottom-label {
      font-size: 9px; font-weight: 400;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .bottom-counter {
      font-size: 11px; font-weight: 300;
      color: rgba(255,255,255,0.3);
    }
    .bottom-counter em { color: rgba(255,255,255,0.75); font-style: normal; font-weight: 400; }

    input[type=range].slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 1px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px; outline: none; cursor: pointer;
    }
    input[type=range].slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(255,255,255,0.75); cursor: pointer;
      transition: transform 0.1s;
    }
    input[type=range].slider:active::-webkit-slider-thumb { transform: scale(1.3); }
    input[type=range].slider::-moz-range-thumb {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(255,255,255,0.75); border: none; cursor: pointer;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .page-tabs { display: none; }
      .nav-right { display: none; }
      .bottom-bar { display: flex; }
      .scroll-hint { left: 14px; bottom: 80px; }
    }
    @media (min-width: 601px) and (max-width: 820px) { .page-tabs { display: none; } }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <span>Cloud Technical Architect 김도훈입니다.</span>
  </div>
  <div class="page-tabs" id="pageTabs"></div>
  <div class="nav-right">
    <span class="counter-badge"><em id="curNum">1</em>&thinsp;/&thinsp;<span id="totNum">33</span></span>
    <button class="arrow-btn" id="prevBtn" aria-label="이전">↑</button>
    <button class="arrow-btn" id="nextBtn" aria-label="다음">↓</button>
  </div>
  <div class="nav-progress" id="navProgress"></div>
</nav>

<div class="stage" id="stage" tabindex="-1">
  <div class="slide-overlay" id="slideOverlay"></div>

  <div class="scroll-hint" id="scrollHint">
    <div class="hint-arrow">
      <span></span><span></span><span></span>
    </div>
    <span class="hint-label">scroll</span>
  </div>
</div>

<div class="bottom-bar">
  <button class="arrow-btn" id="prevBtnM" aria-label="이전">↑</button>
  <div class="bottom-center">
    <div class="bottom-meta">
      <span class="bottom-label">scroll to navigate</span>
      <span class="bottom-counter"><em id="curNumM">1</em>&thinsp;/&thinsp;<span id="totNumM">33</span></span>
    </div>
    <input type="range" class="slider" id="pageSlider" min="0" max="32" value="0" />
  </div>
  <button class="arrow-btn" id="nextBtnM" aria-label="다음">↓</button>
</div>

<script>
  const SLIDES = Array.from({ length: 33 }, (_, i) =>
    `slide${String(i + 1).padStart(2, '0')}.html`
  );

  const TOTAL   = SLIDES.length;
  let current   = 0;
  let animating = false;

  const stage       = document.getElementById('stage');
  const overlay     = document.getElementById('slideOverlay');
  const scrollHint  = document.getElementById('scrollHint');
  const pageTabsEl  = document.getElementById('pageTabs');
  const navProgress = document.getElementById('navProgress');
  const pageSlider  = document.getElementById('pageSlider');
  const curNum      = document.getElementById('curNum');
  const totNum      = document.getElementById('totNum');
  const curNumM     = document.getElementById('curNumM');
  const totNumM     = document.getElementById('totNumM');

  totNum.textContent  = TOTAL;
  totNumM.textContent = TOTAL;
  pageSlider.max      = TOTAL - 1;

  let hintGone = false;
  function hideHint() {
    if (hintGone) return;
    hintGone = true;
    scrollHint.classList.add('hidden');
    setTimeout(() => scrollHint.remove(), 1100);
  }

  // ── 탭 ──────────────────────────────────────
  const WIN = 9;
  function buildTabs() {
    pageTabsEl.innerHTML = '';
    const half = Math.floor(WIN / 2);
    let s = Math.max(0, current - half);
    let e = Math.min(TOTAL - 1, s + WIN - 1);
    if (e - s < WIN - 1) s = Math.max(0, e - WIN + 1);

    if (s > 0) { const el = document.createElement('span'); el.className='tab-ellipsis'; el.textContent='···'; pageTabsEl.appendChild(el); }
    for (let i = s; i <= e; i++) {
      const btn = document.createElement('button');
      btn.className   = 'tab-btn' + (i === current ? ' active' : '');
      btn.textContent = i + 1;
      const idx = i;
      btn.addEventListener('click', () => goTo(idx));
      pageTabsEl.appendChild(btn);
    }
    if (e < TOTAL - 1) { const el = document.createElement('span'); el.className='tab-ellipsis'; el.textContent='···'; pageTabsEl.appendChild(el); }
  }

  // ── 슬라이드 ────────────────────────────────
  const slideEls = [];
  SLIDES.forEach((src, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' current' : ' offBottom');
    div.innerHTML = `<div class="placeholder"><div class="ph-num">${String(i+1).padStart(2,'0')}</div><div class="ph-bar"></div></div>`;
    stage.insertBefore(div, overlay);
    slideEls.push({ el: div, src, loaded: false });
  });

  // ── iframe 스케일 (1280×720 → stage 꽉 채움) ────────
  const SLIDE_W = 1280, SLIDE_H = 720;

  function scaleIframe(iframe) {
    const sw = stage.clientWidth, sh = stage.clientHeight;
    const scale = Math.min(sw / SLIDE_W, sh / SLIDE_H);
    const ox = (sw - SLIDE_W * scale) / 2;
    const oy = (sh - SLIDE_H * scale) / 2;
    iframe.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
  }

  window.addEventListener('resize', () => {
    document.querySelectorAll('.slide iframe').forEach(scaleIframe);
  });

  function attachIframeEvents(iframe) {
    scaleIframe(iframe);
    try {
      iframe.contentWindow.addEventListener('keydown', e => {
        if (e.key==='ArrowDown'||e.key==='ArrowRight') { e.preventDefault(); goNext(); }
        if (e.key==='ArrowUp'  ||e.key==='ArrowLeft')  { e.preventDefault(); goPrev(); }
      });
      iframe.contentWindow.addEventListener('wheel', handleWheel, { passive: false });
    } catch (_) {}
  }

  function loadSlide(i) {
    if (i < 0 || i >= TOTAL) return;
    const s = slideEls[i];
    if (s.loaded) return;
    s.loaded = true;
    const iframe = document.createElement('iframe');
    iframe.src = s.src; iframe.title = `Slide ${i+1}`;
    iframe.onload = () => { s.el.querySelector('.placeholder')?.remove(); attachIframeEvents(iframe); };
    s.el.appendChild(iframe);
  }
  function loadNeighbors(i) { loadSlide(i); loadSlide(i-1); loadSlide(i+1); }

  function updateUI() {
    curNum.textContent  = current + 1;
    curNumM.textContent = current + 1;
    navProgress.style.width = ((current / (TOTAL-1)) * 100) + '%';
    pageSlider.value = current;
    buildTabs();
  }

  function goTo(next, dir) {
    if (next === current || next < 0 || next >= TOTAL) return;
    hideHint();

    const d    = dir ?? (next > current ? 'next' : 'prev');
    const from = slideEls[current].el;
    const to   = slideEls[next].el;
    loadNeighbors(next);

    to.className = 'slide ' + (d==='next' ? 'entering-from-bottom' : 'entering-from-top');
    to.getBoundingClientRect();
    from.className = 'slide ' + (d==='next' ? 'offTop' : 'offBottom');
    to.className   = 'slide current';

    current = next;
    updateUI();
  }

  const goNext = () => goTo(current + 1, 'next');
  const goPrev = () => goTo(current - 1, 'prev');

  document.getElementById('prevBtn').addEventListener('click', goPrev);
  document.getElementById('nextBtn').addEventListener('click', goNext);
  document.getElementById('prevBtnM').addEventListener('click', goPrev);
  document.getElementById('nextBtnM').addEventListener('click', goNext);
  pageSlider.addEventListener('input', () => goTo(+pageSlider.value));

  document.addEventListener('keydown', e => {
    if (e.key==='ArrowDown'||e.key==='ArrowRight') { e.preventDefault(); goNext(); }
    if (e.key==='ArrowUp'  ||e.key==='ArrowLeft')  { e.preventDefault(); goPrev(); }
  });

  let lastScroll = 0;

  function handleWheel(e) {
    e.preventDefault();
    e.stopPropagation();
    const now = Date.now();
    const delta = Math.abs(e.deltaY) >= Math.abs(e.deltaX) ? e.deltaY : e.deltaX;
    if (Math.abs(delta) < 1) return;
    if (now - lastScroll < 50) return;
    lastScroll = now;
    delta > 0 ? goNext() : goPrev();
  }

  // overlay는 pointer-events:none 이므로 stage에만 등록
  stage.addEventListener('wheel', handleWheel, { passive: false });

  let sx = 0, sy = 0;
  stage.addEventListener('touchstart', e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, { passive: true });
  stage.addEventListener('touchend', e => {
    const dx = sx - e.changedTouches[0].clientX;
    const dy = sy - e.changedTouches[0].clientY;
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 44) { dy > 0 ? goNext() : goPrev(); }
  });

  // iframe 내부에서 postMessage로 슬라이드 이동 요청 수신
  window.addEventListener('message', e => {
    if (e.data?.type === 'goToSlide') {
      goTo(e.data.index);
    }
  });

  loadNeighbors(0);
  updateUI();
</script>
</body>
</html>
