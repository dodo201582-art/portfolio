<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>김도훈 Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0c0c0c;
      --sidebar:   #111111;
      --border:    rgba(255,255,255,0.07);
      --text:      rgba(255,255,255,0.82);
      --muted:     rgba(255,255,255,0.28);
      --accent:    #e8e8e8;
      --active-bg: rgba(255,255,255,0.06);
      --nav-h:     48px;
      --side-w:    220px;
      --dur:       380ms;
      --ease:      cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--bg);
      color: var(--text); font-family: 'DM Sans', sans-serif;
      overflow: hidden; user-select: none;
    }

    .root { display: flex; flex-direction: column; height: 100vh; }

    /* ── NAV ── */
    nav {
      height: var(--nav-h); flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 30;
      border-bottom: 1px solid var(--border);
      background: rgba(12,12,12,0.96);
      backdrop-filter: blur(20px);
      position: relative;
    }
    .nav-logo { font-size: 12px; letter-spacing: 0.04em; color: rgba(255,255,255,0.9); }
    .nav-logo strong { font-weight: 500; }
    .nav-center {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 11.5px; font-weight: 400; color: rgba(255,255,255,0.5);
      white-space: nowrap; letter-spacing: 0.01em;
      transition: opacity 0.2s;
    }
    .nav-counter {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--muted); letter-spacing: 0.06em;
    }
    .nav-counter em { color: rgba(255,255,255,0.65); font-style: normal; }
    .progress-bar {
      position: absolute; bottom: 0; left: 0; height: 1px;
      background: rgba(255,255,255,0.45);
      transition: width 0.35s var(--ease);
      pointer-events: none;
    }

    /* ── BODY ROW ── */
    .body-row { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    aside {
      width: var(--side-w); flex-shrink: 0;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-head {
      padding: 12px 16px 10px;
      font-size: 9px; font-weight: 500; letter-spacing: 0.16em;
      color: var(--muted); text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toc-scroll {
      flex: 1; overflow-y: auto; padding: 6px 0;
    }
    .toc-scroll::-webkit-scrollbar { width: 3px; }
    .toc-scroll::-webkit-scrollbar-track { background: transparent; }
    .toc-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.09); border-radius: 2px; }

    .toc-chapter {
      padding: 14px 16px 4px;
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.14em;
      color: rgba(255,255,255,0.35); text-transform: uppercase;
    }
    .toc-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 16px 7px 14px; cursor: pointer;
      position: relative;
      transition: background 0.12s;
    }
    .toc-item:hover { background: rgba(255,255,255,0.05); }
    .toc-item.active { background: var(--active-bg); }
    .toc-item.active::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px; background: rgba(255,255,255,0.7);
      border-radius: 0 1px 1px 0;
    }
    .toc-num {
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: rgba(255,255,255,0.3); min-width: 20px; text-align: right;
      flex-shrink: 0; transition: color 0.12s;
    }
    .toc-item.active .toc-num { color: rgba(255,255,255,0.5); }
    .toc-label {
      font-size: 13px; font-weight: 400;
      color: rgba(255,255,255,0.55);
      line-height: 1.4; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      transition: color 0.12s;
    }
    .toc-item:hover .toc-label { color: rgba(255,255,255,0.85); }
    .toc-item.active .toc-label { color: #fff; font-weight: 500; }

    /* ── STAGE ── */
    #stage {
      flex: 1; position: relative; overflow: hidden; background: #000;
    }
    .slide {
      position: absolute; inset: 0;
      opacity: 0; pointer-events: none;
      transition: transform var(--dur) var(--ease), opacity calc(var(--dur) * 0.7) ease;
      will-change: transform, opacity;
    }
    .slide.current  { opacity: 1; transform: translateX(0);     pointer-events: all; z-index: 2; }
    .slide.offLeft  { opacity: 0; transform: translateX(-6%);  }
    .slide.offRight { opacity: 0; transform: translateX(6%);   }

    iframe {
      width: 1280px; height: 720px; border: none;
      transform-origin: top left; display: block;
    }
  </style>
</head>
<body>
<div class="root">

  <nav>
    <div class="nav-logo">Cloud TA <strong>김도훈</strong></div>
    <div class="nav-center" id="slideTitle">—</div>
    <div class="nav-counter"><em id="curNum">1</em>&thinsp;/&thinsp;33</div>
    <div class="progress-bar" id="progressBar"></div>
  </nav>

  <div class="body-row">

    <aside>
      <div class="sidebar-head">목차</div>
      <div class="toc-scroll" id="tocList"></div>
    </aside>

    <main id="stage"></main>

  </div>
</div>

<script>
  /* ────────────────────────────────────────────────────────
     목차 데이터 — 실제 슬라이드 제목으로 교체해 주세요.
     chapter: 섹션 구분 레이블 (슬라이드 아님)
     item:    실제 슬라이드 (순서대로 33개)
  ──────────────────────────────────────────────────────── */
  const TOC = [
    { type: 'chapter', label: '소개' },
    { type: 'item',    label: '표지' },
    { type: 'item',    label: '자기소개' },
    { type: 'item',    label: '목차' },

    { type: 'chapter', label: '경력 & 교육' },
    { type: 'item',    label: '학력 사항' },
    { type: 'item',    label: '경력 개요' },
    { type: 'item',    label: '주요 프로젝트 1' },
    { type: 'item',    label: '주요 프로젝트 2' },
    { type: 'item',    label: '주요 프로젝트 3' },

    { type: 'chapter', label: '기술 스택' },
    { type: 'item',    label: 'Cloud 인프라' },
    { type: 'item',    label: 'DevOps / CI·CD' },
    { type: 'item',    label: 'IaC & 자동화' },
    { type: 'item',    label: '모니터링 & 운영' },

    { type: 'chapter', label: '프로젝트 상세' },
    { type: 'item',    label: '프로젝트 A — 개요' },
    { type: 'item',    label: '프로젝트 A — 아키텍처' },
    { type: 'item',    label: '프로젝트 A — 성과' },
    { type: 'item',    label: '프로젝트 B — 개요' },
    { type: 'item',    label: '프로젝트 B — 아키텍처' },
    { type: 'item',    label: '프로젝트 B — 성과' },
    { type: 'item',    label: '프로젝트 C — 개요' },
    { type: 'item',    label: '프로젝트 C — 아키텍처' },
    { type: 'item',    label: '프로젝트 C — 성과' },

    { type: 'chapter', label: '역량 & 인증' },
    { type: 'item',    label: '자격증' },
    { type: 'item',    label: '수상 / 활동' },
    { type: 'item',    label: '협업 & 소통 스타일' },

    { type: 'chapter', label: '마무리' },
    { type: 'item',    label: '비전 & 목표' },
    { type: 'item',    label: '지원 동기' },
    { type: 'item',    label: '강점 요약' },
    { type: 'item',    label: 'Q & A' },
    { type: 'item',    label: '감사합니다' },
  ];

  const slides     = TOC.filter(t => t.type === 'item');
  const TOTAL      = slides.length;
  const stage      = document.getElementById('stage');
  const tocList    = document.getElementById('tocList');
  const slideEls   = [];
  const tocItemEls = [];

  /* TOC 렌더 */
  let si = 0;
  TOC.forEach(entry => {
    if (entry.type === 'chapter') {
      const d = document.createElement('div');
      d.className = 'toc-chapter';
      d.textContent = entry.label;
      tocList.appendChild(d);
    } else {
      const idx = si++;
      const btn = document.createElement('div');
      btn.className = 'toc-item' + (idx === 0 ? ' active' : '');
      btn.innerHTML =
        `<span class="toc-num">${String(idx + 1).padStart(2, '0')}</span>` +
        `<span class="toc-label">${entry.label}</span>`;
      btn.addEventListener('click', () => goTo(idx));
      tocList.appendChild(btn);
      tocItemEls.push(btn);
    }
  });

  /* 슬라이드 DOM */
  for (let i = 0; i < TOTAL; i++) {
    const div = document.createElement('div');
    div.className = `slide ${i === 0 ? 'current' : 'offRight'}`;
    stage.appendChild(div);
    slideEls.push({ el: div, loaded: false, src: `slide${String(i + 1).padStart(2, '0')}.html` });
  }

  /* iframe 스케일 */
  const SW = 1280, SH = 720;
  function scaleIframe(ifr) {
    const w = stage.clientWidth, h = stage.clientHeight;
    const s = Math.min(w / SW, h / SH);
    ifr.style.transform =
      `translate(${(w - SW * s) / 2}px,${(h - SH * s) / 2}px) scale(${s})`;
  }

  function loadSlide(i) {
    if (i < 0 || i >= TOTAL || slideEls[i].loaded) return;
    const s = slideEls[i];
    s.loaded = true;
    const ifr = document.createElement('iframe');
    ifr.src = s.src;
    ifr.onload = () => scaleIframe(ifr);
    s.el.appendChild(ifr);
  }

  /* 네비게이션 */
  let current  = 0;
  let animating = false;

  function goTo(next) {
    if (next === current || next < 0 || next >= TOTAL || animating) return;
    animating = true;

    const fromEl = slideEls[current].el;
    const toEl   = slideEls[next].el;
    const fwd    = next > current;

    loadSlide(next);

    toEl.style.transition = 'none';
    toEl.className = `slide ${fwd ? 'offRight' : 'offLeft'}`;

    requestAnimationFrame(() => requestAnimationFrame(() => {
      toEl.style.transition = '';
      toEl.className = 'slide current';
      fromEl.className = `slide ${fwd ? 'offLeft' : 'offRight'}`;
    }));

    current = next;
    updateUI();
    setTimeout(() => { animating = false; }, 420);
  }

  const goNext = () => goTo(current + 1);
  const goPrev = () => goTo(current - 1);

  function updateUI() {
    document.getElementById('curNum').textContent = current + 1;
    document.getElementById('slideTitle').textContent = slides[current].label;
    document.getElementById('progressBar').style.width =
      `${(current / (TOTAL - 1)) * 100}%`;

    tocItemEls.forEach((el, i) => el.classList.toggle('active', i === current));
    tocItemEls[current].scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    loadSlide(current + 1);
    loadSlide(current - 1);
  }

  /* 휠: 사이드바 위면 스크롤, 슬라이드 위면 페이지 이동 */
  const aside   = document.querySelector('aside');
  let lastWheel = 0;

  window.addEventListener('wheel', e => {
    if (aside.matches(':hover')) return; // 사이드바 위 → 기본 스크롤
    e.preventDefault();
    const now = Date.now();
    if (now - lastWheel < 440) return;
    const d = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
    if (Math.abs(d) < 5) return;
    lastWheel = now;
    d > 0 ? goNext() : goPrev();
  }, { passive: false });

  /* 키보드 */
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goPrev();
  });

  window.addEventListener('resize', () =>
    document.querySelectorAll('iframe').forEach(scaleIframe));

  loadSlide(0);
  updateUI();
</script>
</body>
</html>
