<html lang="ko" data-theme="light" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>ME - Narrative Story</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&amp;display=swap" rel="stylesheet">

<style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
            overflow: hidden;
        }
        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            background-color: #0f172a; /* Slate 900 */
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }
        
        /* Left Section: Image/Visual */
        .visual-section {
            flex: 0 0 450px;
            background-color: #1e293b; /* Slate 800 */
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            border-right: 1px solid #334155;
        }
        
        /* Right Section: Content */
        .content-section {
            flex: 1;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        /* Abstract Visual Elements */
        .stat-circle {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 2px solid #3b82f6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            background-color: rgba(30, 41, 59, 0.5);
        }
        .stat-circle::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 1px dashed #64748b;
            z-index: -1;
        }
        
        .quote-mark {
            position: absolute;
            font-size: 8rem;
            color: rgba(59, 130, 246, 0.1);
            font-family: serif;
            top: 40px;
            left: 40px;
            line-height: 1;
        }

        .highlight-box {
            background-color: rgba(59, 130, 246, 0.1);
            border-left: 4px solid #3b82f6;
            padding: 20px 30px;
            margin-top: 40px;
            border-radius: 0 8px 8px 0;
        }

        .step-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }
        .step-item {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .step-icon {
            width: 40px;
            height: 40px;
            background-color: #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #60a5fa;
            flex-shrink: 0;
        }
        .step-text {
            color: #cbd5e1;
            font-size: 1.1rem;
            font-weight: 300;
        }
    </style>

<h1 class="text-5xl font-bold text-white mb-8 leading-tight">

<p class="text-xl text-slate-300 font-light leading-relaxed max-w-2xl">

                    이 과정에서 얻은 가장 큰 변화는 외모가 아닌 <strong class="text-white font-medium">‘해낼 수 있다’는 자신감</strong>이었습니다.
                </p>
